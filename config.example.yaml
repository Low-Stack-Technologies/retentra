# Example configuration for:
#   retentra config.yaml

report:
  title: App Backup Report

sources:
  # Include an existing directory directly in the archive.
  - type: filesystem
    label: Site files
    path: /srv/app/data
    target: app/data

  # Generate backup contents with commands, then collect selected outputs.
  - type: command
    workdir: "{tmpdir}"
    commands:
      - mkdir -p "{tmpdir}/export"
      - sqlite3 /srv/app/app.db ".backup '{tmpdir}/export/app.db'"
    collect:
      - label: DB Dump: app
        path: "{tmpdir}/export/app.db"
        target: app/app.db

archive:
  name: backup-{date}.tar.gz
  format: tar
  compression: gzip

outputs:
  - type: filesystem
    label: Local copy
    path: /var/backups

  - type: sftp
    label: Upload (backup.example.com)
    host: backup.example.com
    port: 22
    username: backup
    remote_path: /backups
    identity_file: ~/.ssh/id_ed25519
    known_hosts: ~/.ssh/known_hosts

# Password authentication is also supported for SFTP:
#
# outputs:
#   - type: sftp
#     label: Upload (backup.example.com)
#     host: backup.example.com
#     port: 22
#     username: backup
#     remote_path: /backups
#     password: change-me

notifications:
  - type: discord
    webhook_url: https://discord.com/api/webhooks/...

  - type: ntfy
    url: https://ntfy.sh/my-topic
    username: optional-username
    password: optional-password
