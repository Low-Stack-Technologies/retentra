name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload the asset to
        required: true

permissions:
  contents: write

jobs:
  linux:
    name: Build Linux ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            asset: retentra-linux-amd64
          - arch: arm64
            asset: retentra-linux-arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build executable
        env:
          GOARCH: ${{ matrix.arch }}
          ASSET: ${{ matrix.asset }}
        run: |
          mkdir -p dist
          CGO_ENABLED=0 GOOS=linux GOARCH="$GOARCH" go build -o "dist/$ASSET" ./cmd/retentra

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
          ASSET: ${{ matrix.asset }}
        run: |
          tag="${RELEASE_TAG:-$INPUT_TAG}"
          gh release upload "$tag" "dist/$ASSET" --clobber
